<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shared Grocery List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <section class="card shadow-sm border-0">
            <div class="card-body p-3 p-md-4">
              <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
                <div>
                  <h1 class="h3 mb-1">Shared Grocery List</h1>
                  <p class="text-body-secondary mb-0">Simple list powered by Azure Functions</p>
                </div>
                <button id="refreshBtn" class="btn btn-outline-secondary">Refresh</button>
              </div>

              <form id="addForm" class="row g-2 mb-3" novalidate>
                <div class="col-12 col-md-9">
                  <label for="itemInput" class="visually-hidden">New item</label>
                  <input
                    id="itemInput"
                    type="text"
                    class="form-control"
                    placeholder="Add an item (e.g., Milk)"
                    maxlength="120"
                    required
                  >
                </div>
                <div class="col-12 col-md-3 d-grid">
                  <button id="addBtn" type="submit" class="btn btn-success">Add Item</button>
                </div>
              </form>

              <div class="d-flex justify-content-between align-items-center mb-2">
                <h2 class="h6 text-uppercase text-body-secondary mb-0">Items</h2>
                <button id="deleteAllBtn" class="btn btn-outline-danger btn-sm">Delete All</button>
              </div>

              <div id="alertContainer" class="mb-2" aria-live="polite"></div>

              <ul id="itemsList" class="list-group" aria-live="polite"></ul>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
